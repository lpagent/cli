version: 2

builds:
  - main: ./cmd/lpagent
    binary: lpagent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/lpagent/cli/internal/version.Version={{.Version}}
      - -X github.com/lpagent/cli/internal/version.Commit={{.ShortCommit}}
      - -X github.com/lpagent/cli/internal/version.Date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: lpagent
    name: cli
  prerelease: auto
